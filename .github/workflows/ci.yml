name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: briefpay_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d briefpay_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/briefpay_test
      JWT_ACCESS_SECRET: test_access_secret_12345678901234567890
      JWT_REFRESH_SECRET: test_refresh_secret_1234567890123456789
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: 30
      CORS_ORIGIN: http://localhost:5173
      PUBLIC_WEB_URL: http://localhost:5173
      UPLOAD_DIR: uploads-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run migration:run
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
